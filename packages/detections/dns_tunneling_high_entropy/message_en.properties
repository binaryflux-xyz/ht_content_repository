title = High-Entropy DNS Tunneling

description = Firewall logs show suspicious DNS query activity detected from source IP {source_ip}. The system queried the domain {host}, which has an unusually long length and high character entropy. The DNS request was sent to destination IP {destination_ip} on port {destination_port}. This activity was allowed by policy ID {policy_id} on device {source_device_name}. The alert triggered because multiple DNS queries from the same source within a 10-minute window contained high-entropy domain names, a behavior commonly associated with domain generation algorithms used by malware.
