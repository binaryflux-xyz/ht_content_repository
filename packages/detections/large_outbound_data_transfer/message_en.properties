title = Large Outbound Data Transfer

description = Firewall logs show potential data exfiltration activity detected. Internal source IP {source_ip} transferred a large volume of outbound data ({network_bytes_out} bytes) to external destination IP {destination_ip} over {network_protocol} on destination port {destination_port}. The connection was allowed by policy ID {policy_id} on device {source_device_name}. This alert triggered because the amount of data sent exceeded the configured threshold within a 15-minute window and the destination IP is not part of the trusted cloud destination list, which may indicate unauthorized data exfiltration.
